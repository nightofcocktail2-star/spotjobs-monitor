name: SPOTJOBS Monitor

on:
  schedule:
    - cron: '*/12 0-15 * * *'  # 9時〜24時 JST（UTC 0〜15時）に12分ごと
  workflow_dispatch:             # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: 監視スクリプトを実行
        run: node index.js
        env:
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_REFRESH_TOKEN }}
          MAIL_USER:              ${{ secrets.MAIL_USER }}
          MAIL_PASS:              ${{ secrets.MAIL_PASS }}
          MAIL_TO:                ${{ secrets.MAIL_TO }}
          TELEGRAM_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: jobs.json をコミット（変更があった場合のみ）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs.json [skip ci]"
          git push
