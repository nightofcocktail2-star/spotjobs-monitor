name: SPOTJOBS Bot

on:
  schedule:
    - cron: '*/5 0-15 * * *'  # 9時〜24時 JST に5分ごと
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: Botコマンドを処理
        run: node bot.js
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 設定ファイルをコミット（変更があった場合のみ）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/user-config.json data/bot-offset.json
          git diff --staged --quiet || git commit -m "chore: update config/offset [skip ci]"
          git push
